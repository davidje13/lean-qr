image: alpine:latest
workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH'

stages:
  - test
  - package

.build_and_test: &build_and_test
  stage: test
  services:
    - name: selenium/standalone-firefox
      alias: firefox
    - name: selenium/standalone-chrome
      alias: chrome
  variables:
    WEBDRIVER_DISABLE_SHM: 'true'
    WEBDRIVER_HOST_CHROME: chrome:4444
    WEBDRIVER_HOST_FIREFOX: firefox:4444
    TESTRUNNER_HOST: '0.0.0.0'
  script:
    - npm install-test

node:20:
  <<: *build_and_test
  image: node:20

node:22:
  <<: *build_and_test
  image: node:22

node:24:
  <<: *build_and_test
  image: node:24
  script:
    - npm install-test
    - apt-get update && apt-get install -y --no-install-recommends zip
    - npm run build-web
  artifacts:
    name: web
    expire_in: 20 minutes
    paths:
      - web-bundle.zip

pages:
  stage: package
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  dependencies:
    - node:20
    - node:22
    - node:24
  environment: sign # grant access to SIGNING_KEY and SIGNING_KEY_PASS project variables
  script:
    - apk add --update --no-cache openssl unzip
    - openssl dgst -sha256 -sign "$SIGNING_KEY" -passin "file:$SIGNING_KEY_PASS" -out web-bundle.zip.sign web-bundle.zip
    - unzip web-bundle.zip && mv web-bundle.zip web-bundle.zip.sign static/
  artifacts:
    expire_in: 20 minutes # safe to delete: https://gitlab.com/gitlab-org/gitlab/-/issues/36358#note_2232186823
    paths:
      - static
